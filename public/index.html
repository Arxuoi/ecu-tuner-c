<!DOCTYPE html>
<html>
<head>
    <title>ECU Tuner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: auto; padding: 20px; }
        .card { background: #f5f5f5; border-radius: 8px; padding: 15px; margin: 10px 0; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; }
        .value { font-size: 2em; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🔧 ECU Tuner</h1>
    <div class="card">
        <h3>Engine RPM</h3>
        <div id="rpm" class="value">---</div>
        <button onclick="fetchRPM()">Refresh</button>
    </div>
    <!-- tambahkan parameter lain: suhu mesin, throttle, dll -->
    <script>
        async function fetchRPM() {
            try {
                const res = await fetch('/api/ecu/rpm');
                const data = await res.json();
                document.getElementById('rpm').innerText = data.rpm + ' rpm';
            } catch(e) {
                alert('Gagal membaca ECU');
            }
        }
        fetchRPM(); // auto load
    </script>
</body>
</html>
